services:
  postgres:
    image: timescale/timescaledb-ha:pg18
    environment:
      POSTGRES_DB: agentic_ui_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic_ui_dev"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
